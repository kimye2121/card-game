          map: createBurstTexture(),
          transparent: true,
          opacity: 0,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
        });
        const lightBurst = new THREE.Mesh(new THREE.PlaneGeometry(2.8, 2.8), burstMat);
        lightBurst.position.set(0, 0.5, -1.5);
        packGroup.add(lightBurst);
        packGroup.userData.lightBurst = lightBurst;

        tearParticles = new THREE.Group();
        const sparkleTex = createSparkleTexture();
        for (let i = 0; i < 28; i++) {
          const isSparkle = i < 18;
          let particle;
          if (isSparkle) {
            const tint = i % 3 === 0 ? 0xfbbf24 : i % 3 === 1 ? 0xffffff : 0x68d8cf;
            const m = new THREE.SpriteMaterial({
              map: sparkleTex,
              color: tint,
              transparent: true,
              blending: THREE.AdditiveBlending,
              depthWrite: false,
            });
            particle = new THREE.Sprite(m);
            particle.scale.setScalar(0.14 + Math.random() * 0.18);
          } else {
            const m = new THREE.MeshBasicMaterial({ color: 0x68d8cf, transparent: true });
            particle = new THREE.Mesh(new THREE.TetrahedronGeometry(0.05), m);
          }
          particle.position.set((Math.random() - 0.5) * 2, 1.2 + Math.random() * 0.4, 0.12 + Math.random() * 0.18);
          particle.userData.vel = new THREE.Vector3(
            (Math.random() - 0.5) * 0.06,
            Math.random() * 0.045 + 0.012,
            (Math.random() - 0.5) * 0.025
          );
          particle.userData.spin = (Math.random() - 0.5) * 0.22;
          tearParticles.add(particle);
        }
        tearParticles.visible = false;
        packGroup.add(tearParticles);

        scene.add(packGroup);
      }

      function createCards() {
        if (cardGroup) scene.remove(cardGroup);
        cardGroup = new THREE.Group();
        cardGroup.position.set(0, -0.05, 0.1);

        const weightsSnapshot = loadWeights();
        const cardWeightOf = (c) => {
          const raw = weightsSnapshot[c.id];
          if (raw === undefined || raw === null || raw === "") return 10;
          const numeric = Number(raw);
          return Number.isFinite(numeric) ? Math.max(0, numeric) : 10;
        };
        const selectFromRarity = (rarityKey) => {
          const pool = CARD_POOL.filter((c) => c.rarityKey === rarityKey && cardWeightOf(c) > 0);
          if (pool.length === 0) return null;
          const totalWeight = pool.reduce((sum, c) => sum + cardWeightOf(c), 0);
          let rand = Math.random() * totalWeight;
          for (const c of pool) {
            const w = cardWeightOf(c);
            if (rand < w) return c;
            rand -= w;
          }
          return pool[pool.length - 1];
        };

        const drawn = [];
        for (let i = 0; i < 5; i++) {
          const roll = Math.random();
          let key = "common";
          if (i === 4) {
            if (roll > 0.85) key = "ultraRare";
            else if (roll > 0.55) key = "rare";
            else key = "uncommon";
          } else if (roll > 0.75) {
            key = "uncommon";
          }

          let selected = selectFromRarity(key);
          if (!selected) {
            const fallbackOrder = ["common", "uncommon", "rare", "ultraRare"].filter((k) => k !== key);
            for (const k of fallbackOrder) {
              selected = selectFromRarity(k);
              if (selected) break;
            }
          }
          if (selected) drawn.push(selected);
        }

        const rarityWeight = { common: 1, uncommon: 2, rare: 3, ultraRare: 4 };
        drawn.sort((a, b) => rarityWeight[a.rarityKey] - rarityWeight[b.rarityKey]);

        cards = drawn.map((data, idx) => {
          const mesh = createCardMesh(data);
          mesh.position.set(0, -0.1 - idx * 0.03, -idx * 0.05);
          mesh.userData = { index: idx, card: data, faceUp: true, saved: false };
          attachCardEffects(mesh, data.rarityKey);
          cardGroup.add(mesh);
          return mesh;
        });

        scene.add(cardGroup);
        currentCardIndex = 0;
        if (typeof resetBtn !== "undefined" && resetBtn) resetBtn.style.display = "none";

        if (cards.length === 0) {
          appState = APP_STATE.COMPLETE;
          if (resetBtn) resetBtn.style.display = "block";
          if (hintText) hintText.textContent = "등록 가능한 카드가 없습니다. 카드 등록에서 가중치를 1 이상으로 설정해 주세요.";
          return;
        }

        cardGroup.position.set(0, -0.2, -0.5);
        cardGroup.scale.setScalar(1.2);
        animateValue(0, 1, 780, (t) => {
          const ease = 1 - Math.pow(1 - t, 3);
          cardGroup.position.y = -0.2 + ease * 0.41;
          cardGroup.position.z = -0.5 + ease * 0.6;
          cardGroup.scale.setScalar(1.2 + ease * 0.8);
        }, () => {
          updateCurrentCardEffects();
        });
      }

      function createCardMesh(cardData) {
        const group = new THREE.Group();
        const frontTex = createCardCanvasTexture(cardData);
        const rarity = RARITY_CONFIG[cardData.rarityKey];
        const frontMat = new THREE.ShaderMaterial({
          uniforms: {
            map: { value: frontTex },
            time: { value: 0 },
            tilt: { value: new THREE.Vector2() },
            hueShift: { value: cardData.hue },
            foilPower: { value: rarity.foil },
            goldPower: { value: rarity.gold },
          },
          vertexShader: `
            varying vec2 vUv; varying vec3 vNormal; varying vec3 vWorldPos;
            void main() {
              vUv = uv; vNormal = normalize(normalMatrix * normal);
              vec4 wp = modelMatrix * vec4(position, 1.0); vWorldPos = wp.xyz;
              gl_Position = projectionMatrix * viewMatrix * wp;
            }
          `,
          fragmentShader: `
            uniform sampler2D map; uniform float time; uniform vec2 tilt;
            uniform float hueShift; uniform float foilPower; uniform float goldPower;
            varying vec2 vUv; varying vec3 vNormal; varying vec3 vWorldPos;
            vec3 hsv2rgb(vec3 c) {
              vec4 K = vec4(1.0, 2.0 / 3.0, 1.0 / 3.0, 3.0);
              vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
              return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
            }
            void main() {
              vec4 base = texture2D(map, vUv);
              vec3 viewDir = normalize(cameraPosition - vWorldPos);
              float fresnel = pow(1.0 - clamp(dot(normalize(vNormal), viewDir), 0.0, 1.0), 2.0);
              float diag = dot(vUv, normalize(vec2(0.7 + tilt.x, 0.5 + tilt.y)));
              float streak = sin((diag + tilt.x * 0.1) * 30.0 + time * 2.0) * 0.5 + 0.5;
              float holo = clamp(streak * 0.42 + fresnel * 0.9, 0.0, 1.0) * foilPower;
              vec3 outColor = base.rgb;
              outColor += vec3(1.0) * (holo * 0.14);
              gl_FragColor = vec4(clamp(outColor, 0.0, 1.0), base.a);
            }
          `,
        });

        const geom = new THREE.PlaneGeometry(1.6, 2.24);
        const frontMesh = new THREE.Mesh(geom, frontMat);
        frontMesh.position.z = 0.018;
        group.add(frontMesh);

        const edge = new THREE.Mesh(new THREE.BoxGeometry(1.64, 2.28, 0.025), new THREE.MeshBasicMaterial({ color: 0x111625 }));
        edge.position.z = -0.02;
        group.add(edge);

        return group;
      }

      function createCardCanvasTexture(card) {
        const cv = document.createElement("canvas");
        cv.width = 400;
        cv.height = 560;
        const ctx = cv.getContext("2d");
        const cfg = RARITY_CONFIG[card.rarityKey];
        const isRare = card.rarityKey === "rare" || card.rarityKey === "ultraRare";

        function drawBaseBackground() {
          if (isRare) {
            const grad = ctx.createLinearGradient(0, 0, 400, 560);
            grad.addColorStop(0, cfg.bgGrad[0]);
            grad.addColorStop(1, cfg.bgGrad[1]);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 400, 560);
            
            ctx.globalAlpha = 0.12 + cfg.foil * 0.06;
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 3;
            for(let i = -200; i < 800; i += 45) {
              ctx.beginPath();
              ctx.moveTo(i, 0);
              ctx.lineTo(i - 200, 560);
              ctx.stroke();
            }
            ctx.globalAlpha = 1.0;
          } else {
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, 400, 560);
            
            const grad = ctx.createRadialGradient(200, 450, 50, 200, 450, 350);
            grad.addColorStop(0, cfg.bgGrad[1]);
            grad.addColorStop(1, "#ffffff");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 300, 400, 260);
            
            ctx.fillStyle = "rgba(0,0,0,0.03)";
            ctx.fillRect(20, 20, 360, 280);
          }
        }

        function drawOverlays(isCustom) {
          ctx.textAlign = "center";
          if (isRare) {
            if (!isCustom) {
              ctx.fillStyle = "rgba(0,0,0,0.4)";
              ctx.fillRect(0, 340, 400, 60);
              ctx.fillRect(40, 480, 320, 50);

              ctx.fillStyle = "rgba(255,255,255,0.3)";
              ctx.font = "900 80px sans-serif";
              ctx.fillText(card.code, 200, 180);
            }

            ctx.shadowColor = "rgba(0,0,0,0.9)";
            ctx.shadowBlur = isCustom ? 10 : 0;
            ctx.fillStyle = "#ffffff";
            ctx.font = "900 36px sans-serif";
            ctx.fillText(card.name, 200, 382);

            ctx.shadowColor = isCustom ? "rgba(0,0,0,0.9)" : cfg.border;
            ctx.shadowBlur = isCustom ? 10 : 15;
            ctx.fillStyle = isCustom ? "#ffffff" : cfg.text;
            ctx.font = "bold 24px sans-serif";
            ctx.fillText(`${cfg.label}`, 200, 515);
            ctx.shadowBlur = 0;
          } else {
            if (!isCustom) {
              ctx.fillStyle = "rgba(0,0,0,0.05)";
              ctx.font = "900 80px sans-serif";
              ctx.fillText(card.code, 200, 180);
            }

            ctx.fillStyle = "#162033";
            ctx.font = "900 32px sans-serif";
            ctx.fillText(card.name, 200, 380);

            ctx.strokeStyle = cfg.border;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(100, 410);
            ctx.lineTo(300, 410);
            ctx.stroke();

            ctx.fillStyle = cfg.border;
            ctx.font = "bold 20px sans-serif";
            ctx.fillText(cfg.label, 200, 450);

            ctx.strokeStyle = "#e2e8f0";
            ctx.lineWidth = 8;
            ctx.strokeRect(4, 4, 392, 552);
          }
        }

        drawBaseBackground();
        drawOverlays(false);

        const tex = new THREE.CanvasTexture(cv);
        tex.colorSpace = THREE.SRGBColorSpace;

        if (card.isCustom && card.imageUrl) {
          const img = new Image();
          img.onload = () => {
            drawBaseBackground();
            if (isRare) {
              ctx.drawImage(img, 0, 0, 400, 560);
            } else {
              ctx.drawImage(img, 20, 20, 360, 280);
            }
            drawOverlays(true);
            tex.needsUpdate = true;
          };
          img.src = card.imageUrl;
        }

        return tex;
      }

      function createTextPlane(text, scale, color, font) {
        const cv = document.createElement("canvas");
        cv.width = 256;
        cv.height = 64;
        const ctx = cv.getContext("2d");
        ctx.font = font;
        ctx.textAlign = "center";
        ctx.fillStyle = color;
        ctx.fillText(text, 128, 42);
        const tex = new THREE.CanvasTexture(cv);
        const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2 * scale, 0.5 * scale), new THREE.MeshBasicMaterial({ map: tex, transparent: true }));
        return mesh;
      }

      function onPointerDown(event) {
        requestDeviceOrientationPermission();
        canvas.setPointerCapture(event.pointerId);
        const pt = new THREE.Vector2(event.clientX, event.clientY);
        drag = { start: pt.clone(), current: pt.clone(), mode: appState === APP_STATE.SEALED && pt.y < window.innerHeight * 0.4 ? "tear" : "card" };
      }

      function onPointerMove(event) {
        pointerTargetTilt.set((event.clientX / window.innerWidth - 0.5) * 2, -(event.clientY / window.innerHeight - 0.5) * 2);
        if (!drag) return;
        drag.current.set(event.clientX, event.clientY);

        if (drag.mode === "tear" && appState === APP_STATE.SEALED) {
          const dx = drag.current.x - drag.start.x;
          const dragWidth = Math.max(360, window.innerWidth * 0.75);
          const progress = Math.min(1, Math.abs(dx) / dragWidth);
          const direction = Math.sign(dx || 1);
          drag.tearProgress = progress;
          drag.tearDirection = direction;
          setTearProgress(progress, direction);
        } else if (drag.mode === "card" && appState === APP_STATE.STACK && cards[currentCardIndex] && cardGroup) {
          const dx = drag.current.x - drag.start.x;
          const dy = drag.current.y - drag.start.y;
          const maxAngle = Math.PI / 9;
          isCardDragging = true;
          cardGroup.rotation.y = Math.max(-maxAngle, Math.min(maxAngle, (dx / 240) * maxAngle));
          cardGroup.rotation.x = -Math.max(-maxAngle, Math.min(maxAngle, (dy / 280) * maxAngle));
          for (let i = currentCardIndex + 1; i < cards.length; i++) {
            if (cards[i]) cards[i].visible = false;
          }
        }
      }

      function onPointerUp() {
        if (!drag) return;
        const dx = drag.current.x - drag.start.x;
        const dy = drag.current.y - drag.start.y;
        lastDragDistance = Math.sqrt(dx * dx + dy * dy);

        if (drag.mode === "tear" && appState === APP_STATE.SEALED) {
          const progress = drag.tearProgress || 0;
          const direction = drag.tearDirection || Math.sign(dx || 1);
          if (progress >= 0.5) openPack(direction, progress);
          else snapBackTear(progress, direction);
        } else if (drag.mode === "card" && appState === APP_STATE.STACK && cardGroup) {
          for (let i = currentCardIndex + 1; i < cards.length; i++) {
            if (cards[i]) cards[i].visible = true;
          }
          const startRotY = cardGroup.rotation.y;
          const startRotX = cardGroup.rotation.x;
          animateValue(0, 1, 320, (t) => {
            const ease = 1 - Math.pow(1 - t, 3);
            cardGroup.rotation.y = startRotY * (1 - ease);
            cardGroup.rotation.x = startRotX * (1 - ease);
          }, () => {
            isCardDragging = false;
          });
        }
        drag = null;
      }

      function onCanvasClick() {
        if (lastDragDistance > 10) {
          lastDragDistance = 0;
          return;
        }
        if (appState === APP_STATE.STACK && cards[currentCardIndex] && !isCardTransitioning) {
          moveCard(1);
        }
      }

      function setTearProgress(progress, direction) {
        if (!packGroup || !packGroup.visible) return;
        const tearStrip = packGroup.userData.tearStrip;

        if (tearStrip) {
          if (progress < 0.45) {
            const p = progress / 0.45;
            tearStrip.visible = true;
            tearStrip.position.copy(tearStrip.userData.basePosition);
            tearStrip.rotation.copy(tearStrip.userData.baseRotation);
            tearStrip.position.x += direction * p * 2.6;
            tearStrip.position.y += Math.sin(p * Math.PI * 0.5) * 0.16;
            tearStrip.position.z += p * 0.18;
            tearStrip.rotation.z = direction * p * p * -0.9;
            tearStrip.rotation.y = direction * p * 0.32;
            tearStrip.material.opacity = 1 - p * 0.15;
          } else if (progress < 0.7) {
            const fp = (progress - 0.45) / 0.25;
            tearStrip.visible = true;
            tearStrip.position.copy(tearStrip.userData.basePosition);
            tearStrip.rotation.copy(tearStrip.userData.baseRotation);
            tearStrip.position.x += direction * (2.6 + fp * 1.4);
            tearStrip.position.y += 0.16 - fp * fp * 2.0;
            tearStrip.position.z += 0.18 + fp * 0.15;
            tearStrip.rotation.z = direction * -0.9 + direction * fp * -2.4;
            tearStrip.rotation.y = direction * (0.32 + fp * 0.3);
            tearStrip.rotation.x = -fp * 0.6;
            tearStrip.material.opacity = 0.85 * (1 - fp);
          } else {
            tearStrip.visible = false;
            tearStrip.material.opacity = 0;
          }
        }

        if (packTop && packTop.visible) {
          const tp = THREE.MathUtils.clamp((progress - 0.18) / 0.65, 0, 1);
          packTop.position.copy(packTop.userData.basePosition);
          packTop.rotation.copy(packTop.userData.baseRotation);
          packTop.position.y += tp * 0.35;
          packTop.position.z -= tp * 0.55;
          packTop.rotation.x = -tp * Math.PI * 0.88;
          packTop.rotation.z = direction * tp * -0.12;
        }
      }

      function previewTear(progress, direction) {
        setTearProgress(progress, direction);
      }

      function snapBackTear(currentProgress, direction) {
        animateValue(currentProgress, 0, 280, (p) => {
          setTearProgress(p, direction);
        });
      }

      function openPack(direction, startProgress = 0) {
        appState = APP_STATE.TEARING;
        updateUi();
        tearParticles.visible = true;
        const lightBurst = packGroup.userData.lightBurst;
        const remaining = Math.max(0.05, 1 - startProgress);
        const duration = 500 + remaining * 500;

        animateValue(0, 1, duration, (t) => {
          const easedT = 1 - Math.pow(1 - t, 2);
          const progress = startProgress + easedT * (1 - startProgress);
          setTearProgress(progress, direction);

          if (lightBurst) {
            const lp = 1 - Math.pow(1 - t, 2);
            lightBurst.material.opacity = lp * 0.45;
            lightBurst.scale.setScalar(0.5 + lp * 1.8);
            lightBurst.rotation.z = lp * 1.6;
          }

          tearParticles.children.forEach((shard) => {
            shard.position.add(shard.userData.vel);
            shard.userData.vel.y -= 0.0009;
            if (shard.isMesh && shard.rotation) {
              shard.rotation.z += shard.userData.spin;
              shard.rotation.x += shard.userData.spin * 0.6;
            }
            shard.material.opacity = Math.max(0, 1 - easedT * 1.05);
          });
        }, () => {
          if (lightBurst) {
            lightBurst.visible = false;
            if (lightBurst.parent) {
              lightBurst.parent.remove(lightBurst);
            } else {
              scene.remove(lightBurst);
            }
            if (lightBurst.material) {
              if (lightBurst.material.map && lightBurst.material.map.dispose) {
                lightBurst.material.map.dispose();
              }
              if (lightBurst.material.dispose) {
                lightBurst.material.dispose();
              }
            }
          }
          packGroup.visible = false;
          tearParticles.visible = false;

          createCards();
          if (cards.length > 0) {
            appState = APP_STATE.STACK;
          }
          updateUi();
        });
      }

      function moveCard(direction) {
        if (appState !== APP_STATE.STACK || !cards[currentCardIndex] || isCardTransitioning) return;
        isCardTransitioning = true;
        const card = cards[currentCardIndex];
        const nextCard = cards[currentCardIndex + 1] || null;
        const sx = card.position.x;

        if (nextCard && nextCard.userData?.card?.rarityKey === "ultraRare") {
          playUltraRareFlash(nextCard, () => {});
        }

        animateValue(0, 1, 300, (t) => {
          card.position.x = sx + direction * t * 3.5;
          card.position.y = -0.1 + t * 0.2;
          card.rotation.z = -direction * t * 0.6;
        }, () => {
          try {
            if (!card.userData.saved) {
              saveCard(card.userData.card);
              card.userData.saved = true;
            }
            card.visible = false;
            currentCardIndex++;
            if (currentCardIndex >= cards.length) {
              appState = APP_STATE.COMPLETE;
              resetBtn.style.display = "block";
              isCardTransitioning = false;
              updateUi();
            } else {
              arrangeStack();
              const newCurrent = cards[currentCardIndex];
              if (newCurrent?.userData?.card?.rarityKey === "ultraRare") {
                cards.forEach((c, idx) => {
                  if (idx !== currentCardIndex && c.userData.effects) {
                    c.userData.effects.visible = false;
                    c.userData.effects.userData.fadeIn = 0;
                  }
                });
              } else {
                updateCurrentCardEffects();
              }
              isCardTransitioning = false;
              updateUi();
            }
          } catch (err) {
            console.error("moveCard callback error:", err);
            isCardTransitioning = false;
            updateUi();
          }
        });
      }

      function arrangeStack() {
        for (let i = currentCardIndex; i < cards.length; i++) {
          const stackIndex = i - currentCardIndex;
          const card = cards[i];
          card.position.set(0, -0.1 - stackIndex * 0.03, -stackIndex * 0.05);
        }
      }

      function resetPack() {
        animationJobs = [];
        isCardTransitioning = false;
        lastDragDistance = 0;
        drag = null;
        if (cardGroup) scene.remove(cardGroup);
        cardGroup = null;
        cards = [];
        currentCardIndex = 0;
        createPack();
        appState = APP_STATE.SEALED;
        resetBtn.style.display = "none";
        updateUi();
      }

      function saveCard(card) {
        collection[card.id] = { count: (collection[card.id]?.count || 0) + 1 };
        localStorage.setItem("three-card-collection", JSON.stringify(collection));
        renderCollectionTab();
        renderRegisterTab();
      }

      function registerCard(cardId) {
        setCardCount(cardId, (collection[cardId]?.count || 0) + 1);
      }

      function setCardCount(cardId, count) {
        const card = CARD_POOL.find((item) => item.id === cardId);
        if (!card) return;
        
        const newCount = Math.max(0, parseInt(count, 10) || 0);
        if (newCount === 0) {
          if (collection[card.id]) delete collection[card.id];
        } else {
          collection[card.id] = { count: newCount };
        }
        
        localStorage.setItem("three-card-collection", JSON.stringify(collection));
        renderCollectionTab();
        renderRegisterTab();
      }

      function loadCollection() {
        try {
          const raw = JSON.parse(localStorage.getItem("three-card-collection")) || {};
          const validIds = new Set(CARD_POOL.map((card) => card.id));
          const normalized = {};

          Object.entries(raw).forEach(([cardId, entry]) => {
            if (!validIds.has(cardId)) return;
            const count = Number(entry?.count || 0);
            if (!Number.isFinite(count) || count <= 0) return;
            normalized[cardId] = { count: Math.floor(count) };
          });

          if (JSON.stringify(raw) !== JSON.stringify(normalized)) {
            localStorage.setItem("three-card-collection", JSON.stringify(normalized));
          }

          return normalized;
        } catch {
          return {};
        }
      }

      function resetCollectionStorageOnce() {
        try {
          const flagKey = "three-card-collection-reset-v2";
          if (localStorage.getItem(flagKey) === "1") return;
          localStorage.removeItem("three-card-collection");
          localStorage.setItem(flagKey, "1");
        } catch (err) {
          console.warn("collection reset skipped:", err);
        }
      }

      function setCardWeight(cardId, weight, rerender = true) {
        let weights = loadWeights();
        const parsed = Number.parseFloat(weight);
        const newWeight = Number.isFinite(parsed) ? Math.max(0, parsed) : 0;
        weights[cardId] = newWeight;
        localStorage.setItem("three-card-weights", JSON.stringify(weights));
        if (rerender) {
          renderRegisterTab();
        }
      }

      function loadWeights() {
        try {
          return JSON.parse(localStorage.getItem("three-card-weights")) || {};
        } catch {
          return {};
        }
      }

      function showCardModal(cardId) {
        const card = CARD_POOL.find(c => c.id === cardId);
        if (!card) return;
        
        let modal = document.getElementById("cardModal");
        if (!modal) {
          modal = document.createElement("div");
          modal.id = "cardModal";
          modal.style.cssText = "display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; flex-direction:column; backdrop-filter:blur(8px);";
          
          const content = document.createElement("div");
          content.id = "cardModalContent";
          content.style.cssText = "position:relative; width:85%; max-width:380px; display:flex; justify-content:center;";
          modal.appendChild(content);
          
          const closeBtn = document.createElement("button");
          closeBtn.textContent = "닫기";
          closeBtn.style.cssText = "margin-top:24px; padding:12px 32px; background:var(--accent); color:#fff; border:none; border-radius:12px; font-weight:900; font-size:1.1rem; cursor:pointer; box-shadow:0 8px 16px rgba(0,0,0,0.3);";
          closeBtn.onclick = () => modal.style.display = "none";
          modal.appendChild(closeBtn);
          
          document.body.appendChild(modal);
        }
        
        const content = document.getElementById("cardModalContent");
        content.innerHTML = "";
        
        const tex = createCardCanvasTexture(card);
        const cv = tex.image;
        cv.style.width = "100%";
        cv.style.height = "auto";
        cv.style.borderRadius = "4.5%";
        cv.style.boxShadow = "0 20px 50px rgba(0,0,0,0.6)";
        content.appendChild(cv);
        
        modal.style.display = "flex";
      }

      function renderCollectionTab() {
        collection = loadCollection();
        const ownedCards = CARD_POOL.filter((card) => (collection[card.id]?.count || 0) > 0);
        const totalCount = ownedCards.reduce((sum, card) => sum + (collection[card.id]?.count || 0), 0);
        collectionCount.textContent = `${totalCount}장 보유 중 (${ownedCards.length}종)`;

        collectionGrid.innerHTML = CARD_POOL.map((poolCard) => {
          const match = collection[poolCard.id];
          const cfg = RARITY_CONFIG[poolCard.rarityKey];
          if (match && match.count > 0) {
            const bgImage = poolCard.imageUrl ? `url(${poolCard.imageUrl})` : `linear-gradient(135deg, ${cfg.bgGrad[0]}, ${cfg.bgGrad[1]})`;
            return `
              <div class="collection-card owned" onclick="showCardModal('${poolCard.id}')" style="background: ${bgImage}; background-size: cover; background-position: center; border-color: ${cfg.border}; cursor:pointer;">
                <div class="card-badge" style="color:#ffffff; background:rgba(0,0,0,0.5);">${cfg.symbol}</div>
                <div class="card-info" style="background: rgba(0,0,0,0.65); padding: 6px; border-radius: 8px; margin: -4px;">
                  <span class="c-name" style="color:#fff">${poolCard.name}</span>
                  <span class="c-count" style="color:#ddd">보유량: ${match.count}개</span>
                </div>
              </div>
            `;
          }
          
          const unownedBg = poolCard.imageUrl ? `url(${poolCard.imageUrl})` : 'none';
          return `
            <div class="collection-card unowned" style="background-image: ${unownedBg}; background-size: cover; background-position: center;">
              <div class="card-badge" style="background:rgba(0,0,0,0.5); color:#ffffff;">?</div>
              <div class="card-info" style="${poolCard.imageUrl ? 'background: rgba(0,0,0,0.65); padding: 6px; border-radius: 8px; margin: -4px;' : ''}">
                <span class="c-name" style="${poolCard.imageUrl ? 'color:#fff' : ''}">${poolCard.name}</span>
                <span class="c-count" style="color:var(--muted)">미획득</span>
              </div>
            </div>
          `;
        }).join("");
      }

      function editCustomCard(cardId) {
        const card = CARD_POOL.find(c => c.id === cardId);
        if (!card) return;
        editingCardId = cardId;
        
        const titleInput = document.querySelector("#customCardTitle");
        const raritySelect = document.querySelector("#customCardRarity");
        
        titleInput.value = card.name;
        raritySelect.value = card.rarityKey;
        
        const btn = document.querySelector("#registerCustomBtn");
        btn.textContent = "카드 수정 완료";
        setRegisterActionMode(true);
        
        document.querySelector("#customCardImage").value = "";
        
        document.getElementById("registerPanel").scrollTo({ top: 0, behavior: 'smooth' });
        
        titleInput.style.transition = "box-shadow 0.3s";
        titleInput.style.boxShadow = "0 0 0 3px var(--accent)";
        raritySelect.style.transition = "box-shadow 0.3s";
        raritySelect.style.boxShadow = "0 0 0 3px var(--accent)";
        
        setTimeout(() => {
          titleInput.style.boxShadow = "none";
          raritySelect.style.boxShadow = "none";
        }, 1500);
        
        // Removed the alert to avoid interrupting the flow, the visual scroll is enough.
      }

      function resetRegisterEditor() {
        const fileInput = document.querySelector("#customCardImage");
        const cropEditor = document.querySelector("#cropEditor");
        const cropImage = document.querySelector("#cropImage");
        const cropBox = document.querySelector("#cropBox");
        const titleInput = document.querySelector("#customCardTitle");
        const raritySelect = document.querySelector("#customCardRarity");
        const btn = document.querySelector("#registerCustomBtn");

        editingCardId = null;
        if (fileInput) fileInput.value = "";
        if (titleInput) {
          titleInput.value = "";
          titleInput.defaultValue = "";
          titleInput.blur();
        }
        if (raritySelect) {
          raritySelect.selectedIndex = 0;
          raritySelect.value = "";
        }
        if (cropBox) {
          cropBox.style.width = "180px";
          cropBox.style.height = "140px";
        }
        if (cropEditor) cropEditor.style.display = "none";
        if (cropImage) cropImage.src = "";
        cropState.img = null;
        if (btn) {
          btn.textContent = "나만의 카드 만들기";
          btn.disabled = false;
          btn.style.width = "100%";
          btn.style.flex = "";
        }
        setRegisterActionMode(false);
      }

      function setRegisterActionMode(isEditing) {
        if (!registerActionRow) return;
        registerActionRow.classList.toggle("editing", isEditing);
        registerActionRow.style.display = isEditing ? "grid" : "block";
        registerActionRow.innerHTML = isEditing
          ? `
            <button id="registerCustomBtn" type="button">카드 수정 완료</button>
            <button id="cancelRegisterEditBtn" type="button" class="secondary">취소</button>
          `
          : `
            <button id="registerCustomBtn" type="button">나만의 카드 만들기</button>
          `;
      }

      function renderRegisterTab() {
        const weights = loadWeights();
        registerCount.textContent = `등장 확률 조절`;

        registerGrid.innerHTML = CARD_POOL.map((poolCard) => {
          const rawWeight = weights[poolCard.id];
          const parsedWeight = rawWeight !== undefined && rawWeight !== null && rawWeight !== "" ? Number(rawWeight) : 10;
          const safeWeight = Number.isFinite(parsedWeight) ? Math.max(0, parsedWeight) : 10;
          const cfg = RARITY_CONFIG[poolCard.rarityKey];
          const countText = `출현 가중치: ${safeWeight.toFixed(1)}`;

          let actionBtnsHtml = "";
          if (poolCard.isCustom) {
            actionBtnsHtml = `
              <div style="display:flex; gap:6px; margin-top:6px;">
                <button class="action edit-btn" type="button" data-edit="${poolCard.id}" style="flex:1;">수정</button>
                <button class="action delete" type="button" data-delete="${poolCard.id}" style="flex:1;">삭제</button>
              </div>
            `;
          } else {
            actionBtnsHtml = `<button class="action delete" type="button" data-delete="${poolCard.id}" style="margin-top:6px;">삭제</button>`;
          }

          return `
            <div class="register-card" style="border-color:${cfg.border}">
              <div class="meta">
                <span style="color:${cfg.border}; font-weight:900;">${cfg.symbol}</span>
                <span>${cfg.label}</span>
              </div>
              <div class="title">${poolCard.name}</div>
              <div class="meta">
                <span>${countText}</span>
                <span>${poolCard.code}</span>
              </div>
              <div style="display:flex; flex-direction:column; gap:4px;">
                <div class="probability-row">
                  <input type="number" class="probability-input count-input" data-id="${poolCard.id}" value="${safeWeight}" min="0" step="0.1" inputmode="decimal" aria-label="${poolCard.name} 등장 가중치" />
                  <span class="probability-unit">가중치</span>
                </div>
                ${actionBtnsHtml}
              </div>
            </div>
          `;
        }).join("");

        registerGrid.querySelectorAll(".count-input").forEach((input) => {
          input.addEventListener("input", () => {
            setCardWeight(input.dataset.id, input.value, false);
          });
          input.addEventListener("change", () => {
            setCardWeight(input.dataset.id, input.value, true);
          });
          input.addEventListener("blur", () => {
            setCardWeight(input.dataset.id, input.value, true);
          });
        });

        registerGrid.querySelectorAll("[data-edit]").forEach((button) => {
          button.addEventListener("click", () => editCustomCard(button.dataset.edit));
        });

        registerGrid.querySelectorAll("[data-delete]").forEach((button) => {
          button.addEventListener("click", () => deleteCustomCard(button.dataset.delete));
        });
      }
      function deleteCustomCard(cardId) {
        if (!confirm("정말 이 카드를 완전히 삭제하시겠습니까? (보유 목록과 팩 개봉 후보에서 사라집니다.)")) return;
        
        let deletedCards = [];
        try { deletedCards = JSON.parse(localStorage.getItem("three-deleted-cards") || "[]"); } catch(e){}
        if (!deletedCards.includes(cardId)) {
          deletedCards.push(cardId);
          localStorage.setItem("three-deleted-cards", JSON.stringify(deletedCards));
        }

        let customStored = [];
        try { customStored = JSON.parse(localStorage.getItem("three-custom-cards") || "[]"); } catch(e){}
        customStored = customStored.filter(c => c.id !== cardId);
        localStorage.setItem("three-custom-cards", JSON.stringify(customStored));

        const index = CARD_POOL.findIndex(c => c.id === cardId);
        if (index > -1) CARD_POOL.splice(index, 1);

        collection = loadCollection();
        if (collection[cardId]) {
          delete collection[cardId];
          localStorage.setItem("three-card-collection", JSON.stringify(collection));
        }

        renderCollectionTab();
        renderRegisterTab();
      }

      function updateUi() {
        if (stateText) stateText.textContent = appState;
        if (appState === APP_STATE.SEALED) {
          if (hintText) hintText.textContent = "팩 상단을 누른 뒤 가로로 스와이프하세요.";
          if (resetBtn) resetBtn.style.display = "none";
        } else if (appState === APP_STATE.STACK) {
          if (hintText) hintText.textContent = "카드를 터치하면 다음 카드로 넘어갑니다. 드래그하면 각도를 조절할 수 있어요.";
        } else if (appState === APP_STATE.COMPLETE) {
          if (hintText) hintText.textContent = "모든 카드를 모았습니다. 하단 컬렉션에서 확인하세요.";
        }
      }

      function requestDeviceOrientationPermission() {
        if (orientationPermissionAsked || !window.DeviceOrientationEvent) return;
        orientationPermissionAsked = true;
        if (typeof DeviceOrientationEvent.requestPermission === "function") {
          DeviceOrientationEvent.requestPermission()
            .then((state) => {
              deviceTiltActive = state === "granted";
            })
            .catch(() => {
              deviceTiltActive = false;
            });
        }
      }

      function onDeviceOrientation(event) {
        if (typeof event.beta !== "number" || typeof event.gamma !== "number") return;
        const gamma = THREE.MathUtils.clamp(event.gamma, -30, 30) / 30;
        const beta = THREE.MathUtils.clamp(event.beta - 45, -30, 30) / 30;
        deviceTargetTilt.set(gamma, -beta);
        deviceTiltActive = true;
      }

      function animateValue(from, to, duration, onUpdate, onComplete) {
        animationJobs.push({ from, to, duration, startedAt: performance.now(), onUpdate, onComplete });
      }

      function tickAnimations(now) {
        animationJobs = animationJobs.filter((job) => {
          const t = Math.min(1, (now - job.startedAt) / job.duration);
          job.onUpdate(THREE.MathUtils.lerp(job.from, job.to, t));
          if (t >= 1) {
            job.onComplete?.();
            return false;
          }
          return true;
        });
      }

      function animate(now = 0) {
        requestAnimationFrame(animate);
        const deviceWeight = deviceTiltActive ? 0.7 : 0;
        combinedTilt.set(pointerTargetTilt.x * 0.5 + deviceTargetTilt.x * deviceWeight, pointerTargetTilt.y * 0.5 + deviceTargetTilt.y * deviceWeight);
        pointerTilt.lerp(combinedTilt, 0.1);
        tickAnimations(now);

        if (packGroup && appState === APP_STATE.SEALED) {
          packGroup.rotation.y = Math.sin(now * 0.001) * 0.05 + pointerTilt.x * 0.1;
        }
        cards.forEach((card) => {
          card.children.forEach((child) => {
            if (child.material?.uniforms?.time) {
              child.material.uniforms.time.value = now * 0.001;
              child.material.uniforms.tilt.value.copy(pointerTilt);
            }
          });
        });
        if (cardGroup && appState === APP_STATE.STACK && !isCardDragging) {
          cardGroup.rotation.y = pointerTilt.x * 0.1;
          cardGroup.rotation.x = pointerTilt.y * 0.05;
        }

        if (cards.length > 0 && currentCardIndex < cards.length) {
          const activeCard = cards[currentCardIndex];
          const fx = activeCard?.userData.effects;
          if (fx && fx.visible) {
            const fade = fx.userData.fadeIn ?? 1;
            if (fx.userData.aura) {
              fx.userData.aura.material.opacity = (0.5 + Math.sin(now * 0.002) * 0.18) * fade;
              fx.userData.aura.rotation.z = now * 0.0003;
            }
            if (fx.userData.rays) {
              fx.userData.rays.rotation.z = now * 0.00065;
              fx.userData.rays.material.opacity = (0.4 + Math.sin(now * 0.003) * 0.13) * fade;
            }
            fx.userData.sparkles?.forEach((s) => {
              const ud = s.userData;
              ud.phase += 0.022 * ud.speed;
              const r = ud.baseR + Math.sin(ud.phase) * 0.18;
              const angle = ud.baseAngle + Math.sin(ud.phase * 0.62) * 0.28;
              s.position.x = Math.cos(angle) * r;
              s.position.y = Math.sin(angle) * r * 1.25;
              const twinkle = (Math.sin(ud.phase * 2.1) + 1) * 0.5;
              s.material.opacity = (0.35 + twinkle * 0.65) * fade;
              s.scale.setScalar(ud.baseScale * (0.7 + twinkle * 0.5));
            });
          }
        }

        renderer.render(scene, camera);
      }

      function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
    </script>
  </body>
</html>
