<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f3f8ff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>직접 만드는 카드 게임</title>
    <style>
      :root {
        color-scheme: light;
        --bg-main: #f3f8ff;
        --ink: #162033;
        --muted: #5d6b80;
        --panel: rgba(255, 255, 255, 0.82);
        --line: rgba(22, 32, 51, 0.14);
        --accent: #2dd4bf;
        --pink: #ec4899;
        --gold: #fbbf24;
        --nav-height: 64px;
        --safe-bottom: env(safe-area-inset-bottom, 0px);
      }

      * {
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      html, body {
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        overflow: hidden;
        background: var(--bg-main);
        color: var(--ink);
        font-family: Inter, Pretendard, system-ui, sans-serif;
      }

      .view-panel {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: calc(var(--nav-height) + var(--safe-bottom));
        overflow: hidden;
        display: none;
      }

      .view-panel.active {
        display: block;
      }

      #stage {
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      .hud {
        position: absolute;
        top: calc(14px + env(safe-area-inset-top, 0px));
        right: 14px;
        left: 14px;
        z-index: 5;
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 12px;
        pointer-events: none;
      }

      .brand,
      .status {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(20px);
      }

      .brand {
        max-width: min(70vw, 420px);
        padding: 12px 16px;
      }

      .brand strong {
        display: block;
        font-size: 1rem;
        color: var(--ink);
      }

      .brand span,
      .status span,
      .hint {
        color: var(--muted);
        font-size: 0.8rem;
        margin-top: 2px;
        display: block;
      }

      .status {
        min-width: 90px;
        padding: 12px;
        text-align: right;
      }

      .status strong {
        display: block;
        color: var(--accent);
        font-size: 0.95rem;
      }

      .hint {
        position: absolute;
        right: 16px;
        top: calc(14px + env(safe-area-inset-top, 0px));
        left: 16px;
        z-index: 5;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.78);
        text-align: center;
        backdrop-filter: blur(10px);
        pointer-events: none;
      }

      .center-controls {
        position: absolute;
        bottom: 14px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 30;
        pointer-events: auto;
      }

      #collectionPanel {
        padding: calc(20px + env(safe-area-inset-top, 0px)) 20px 20px;
        overflow-y: auto;
        background: #f3f8ff;
      }

      #registerPanel {
        padding: calc(20px + env(safe-area-inset-top, 0px)) 20px 20px;
        overflow-y: auto;
        background: #f3f8ff;
      }

      .collection-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        border-bottom: 1px solid var(--line);
        padding-bottom: 12px;
      }

      .collection-header h2 {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 900;
        background: linear-gradient(135deg, #172033, var(--muted));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .grid-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 16px;
        padding-bottom: 40px;
      }

      .register-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
        border-bottom: 1px solid var(--line);
        padding-bottom: 12px;
      }

      .register-toolbar h2 {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 900;
        background: linear-gradient(135deg, #172033, var(--muted));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .register-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 14px;
        padding-bottom: 40px;
      }

      .register-card {
        display: grid;
        gap: 10px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 10px 20px rgba(22, 32, 51, 0.08);
      }

      .register-card .meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        font-size: 0.78rem;
        color: var(--muted);
      }

      .register-card .title {
        font-weight: 900;
        color: var(--ink);
        line-height: 1.15;
      }

      .register-card .action {
        min-height: 40px;
        padding: 8px 12px;
        border-radius: 10px;
        border: 1px solid rgba(45, 212, 191, 0.35);
        background: linear-gradient(135deg, rgba(20, 184, 166, 0.2), rgba(45, 212, 191, 0.1));
        color: #0f4f49;
        font-weight: 900;
        font-size: 0.9rem;
        font-family: inherit;
        cursor: pointer;
        touch-action: manipulation;
        white-space: nowrap;
      }
      .register-card .action.edit-btn {
        background: linear-gradient(135deg, #14b8a6, #2dd4bf);
        color: #ffffff;
        border-color: #14b8a6;
      }
      .register-card .action.delete {
        background: linear-gradient(135deg, rgba(239, 68, 68, 0.18), rgba(239, 68, 68, 0.08));
        color: #b91c1c;
        border-color: rgba(239, 68, 68, 0.45);
      }

      .probability-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: center;
      }

      .probability-input {
        width: 100%;
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.96);
        color: var(--ink);
        font: inherit;
        font-weight: 800;
        padding: 0 12px;
        outline: none;
      }

      .probability-input:focus {
        border-color: rgba(45, 212, 191, 0.65);
        box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.16);
      }

      .probability-unit {
        font-size: 0.8rem;
        font-weight: 900;
        color: var(--muted);
      }

      .collection-card {
        background: #ffffff;
        border: 2px solid var(--line);
        border-radius: 14px;
        aspect-ratio: 1 / 1.4;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 12px;
        position: relative;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        transition: transform 0.2s;
      }

      .collection-card:active {
        transform: scale(0.96);
      }

      .collection-card.owned {
        border-color: rgba(255, 255, 255, 0.25);
      }

      .collection-card.unowned {
        opacity: 0.25;
        border-style: dashed;
      }

      .card-badge {
        align-self: flex-start;
        font-size: 0.7rem;
        font-weight: 900;
        padding: 2px 6px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.15);
      }

      .card-info {
        display: flex;
        flex-direction: column;
      }

      .card-info .c-name {
        font-weight: 800;
        font-size: 0.9rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .card-info .c-count {
        font-size: 0.75rem;
        color: var(--accent);
        font-weight: bold;
        margin-top: 2px;
      }

      .nav-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: calc(var(--nav-height) + var(--safe-bottom));
        background: rgba(255, 255, 255, 0.94);
        border-top: 1px solid var(--line);
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        z-index: 10;
        padding-bottom: var(--safe-bottom);
      }

      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        font-weight: 700;
        font-size: 0.85rem;
        cursor: pointer;
        gap: 4px;
        transition: color 0.2s;
      }

      .nav-item.active {
        color: var(--accent);
        background: rgba(45, 212, 191, 0.05);
      }

      .nav-icon {
        font-size: 1.2rem;
        font-weight: 900;
      }

      button.primary {
        min-height: 44px;
        padding: 0 24px;
        border: 1px solid rgba(45, 212, 191, 0.4);
        border-radius: 22px;
        background: linear-gradient(135deg, rgba(20, 184, 166, 0.28), rgba(45, 212, 191, 0.18));
        color: #0f4f49;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(45, 212, 191, 0.2);
        backdrop-filter: blur(5px);
        pointer-events: auto;
        touch-action: manipulation;
      }
      
      .custom-register-form {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 24px;
        padding: 20px;
        background: #ffffff;
        border: 1px solid var(--line);
        border-radius: 14px;
        box-shadow: 0 8px 16px rgba(0,0,0,0.06);
      }
      .custom-register-form label {
        font-size: 0.85rem;
        font-weight: bold;
        color: var(--muted);
        margin-bottom: -6px;
      }
      .custom-register-form input, .custom-register-form select {
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 10px;
        font-size: 1rem;
        font-family: inherit;
        background: var(--bg-main);
        color: var(--ink);
        transition: border-color 0.2s;
      }
      .custom-register-form input:focus, .custom-register-form select:focus {
        outline: none;
        border-color: var(--accent);
      }
      .custom-register-form button {
        min-height: 48px;
        border-radius: 12px;
        border: none;
        background: linear-gradient(135deg, #14b8a6, #2dd4bf);
        color: #fff;
        font-weight: 900;
        font-size: 1rem;
        cursor: pointer;
        margin-top: 8px;
        box-shadow: 0 4px 12px rgba(45, 212, 191, 0.3);
        transition: transform 0.1s, opacity 0.2s;
        width: 100%;
      }
      .custom-register-form button:active {
        transform: scale(0.98);
      }

      .register-action-row {
        display: block;
        gap: 10px;
        margin-top: 8px;
      }

      .register-action-row.editing {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
      }

      #registerCustomBtn {
        width: 100%;
      }

      .register-action-row button.secondary {
        min-width: 84px;
        background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
        color: #162033;
      }

      @media (max-width: 420px) {
        .register-action-row.editing {
          grid-template-columns: 1fr;
        }

        .register-action-row button.secondary {
          min-width: 0;
        }
      }

      .count-btn {
        display: none !important;
      }

      .count-input {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="packPanel" class="view-panel active">
      <canvas id="stage" aria-label="3D 카드 팩 개봉 프리뷰"></canvas>
      <div class="hint" id="hintText">팩 상단을 누른 뒤 가로로 스와이프하세요.</div>
      <div class="center-controls">
        <button id="resetBtn" class="primary" type="button">새 카드 팩 열기</button>
      </div>
    </div>

    <div id="collectionPanel" class="view-panel">
      <div class="collection-header">
        <h2>내 아카이브 컬렉션</h2>
        <span id="collectionCount" style="font-weight: 800; color: var(--accent);">0장 보유 중 (0종)</span>
      </div>
      <div class="grid-container" id="collectionGrid"></div>
    </div>

    <div id="registerPanel" class="view-panel">
      <div class="register-toolbar">
        <h2>카드 등록</h2>
        <span id="registerCount" style="font-weight: 800; color: var(--accent);">0장 등록됨</span>
      </div>
      <div class="custom-register-form">
        <label for="customCardImage">카드 이미지</label>
        <input type="file" id="customCardImage" accept="image/*" />
        
        <div id="cropEditor" style="display:none; margin: 10px 0; background: rgba(0,0,0,0.1); border-radius: 8px; padding: 10px;">
          <div style="font-size: 0.85rem; color: #64748b; margin-bottom: 8px;">드래그해서 위치를 조정하고 슬라이더로 크기를 맞추세요.</div>
          <div style="display: flex; justify-content: center; align-items: center; width: 100%; height: 300px; background: #111; border-radius: 4px; overflow: hidden; position: relative;">
            <div id="cropBox" style="position: relative; width: 180px; height: 140px; border: 2px dashed rgba(255,255,255,0.5); overflow: hidden; cursor: grab; touch-action: none;">
              <img id="cropImage" style="position: absolute; transform-origin: top left; pointer-events: none;" />
            </div>
          </div>
          <input type="range" id="cropZoom" min="0.1" max="5" step="0.01" value="1" style="width: 100%; margin-top: 15px;" />
        </div>
        
        <label for="customCardTitle">카드 제목</label>
        <input type="text" id="customCardTitle" placeholder="직접 입력한 카드 이름" />
        
        <label for="customCardRarity">카드 레어도</label>
        <select id="customCardRarity">
          <option value="" selected>레어도 선택</option>
          <option value="common">커먼 (C)</option>
          <option value="uncommon">언커먼 (U)</option>
          <option value="rare">레어 (R)</option>
          <option value="ultraRare">울트라 레어 (UR)</option>
        </select>
        
        <div class="register-action-row" id="registerActionRow">
          <button id="registerCustomBtn" type="button">나만의 카드 만들기</button>
          <button id="cancelRegisterEditBtn" type="button" class="secondary" style="display:none;">취소</button>
        </div>
      </div>
      <div class="register-grid" id="registerGrid"></div>
    </div>

    <nav class="nav-bar">
      <div class="nav-item active" onclick="switchTab('pack')">
        <span class="nav-icon">📦</span>
        <span>팩 개봉</span>
      </div>
      <div class="nav-item" onclick="switchTab('register')">
        <span class="nav-icon">📝</span>
        <span>카드 등록</span>
      </div>
      <div class="nav-item" onclick="switchTab('collection')">
        <span class="nav-icon">🎴</span>
        <span>내 컬렉션</span>
      </div>
    </nav>

    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script>
      const canvas = document.querySelector("#stage");
      const stateText = document.querySelector("#stateText");
      const hintText = document.querySelector("#hintText");
      const resetBtn = document.querySelector("#resetBtn");
      const collectionGrid = document.querySelector("#collectionGrid");
      const collectionCount = document.querySelector("#collectionCount");
      const registerGrid = document.querySelector("#registerGrid");
      const registerCount = document.querySelector("#registerCount");
      const registerActionRow = document.querySelector("#registerActionRow");
      const cancelRegisterEditBtn = document.querySelector("#cancelRegisterEditBtn");

      const RARITY_CONFIG = {
        common: { label: "커먼", symbol: "C", border: "#10b981", foil: 0.15, gold: 0, text: "#064e3b", bgGrad: ["#ecfdf5", "#a7f3d0"] },
        uncommon: { label: "언커먼", symbol: "U", border: "#0ea5e9", foil: 0.75, gold: 0, text: "#0c4a6e", bgGrad: ["#f0f9ff", "#bae6fd"] },
        rare: { label: "레어", symbol: "R", border: "#d946ef", foil: 1.25, gold: 0, text: "#fdf4ff", bgGrad: ["#fbcfe8", "#c026d3"] },
        ultraRare: { label: "울트라 레어", symbol: "UR", border: "#f59e0b", foil: 1.9, gold: 1.2, text: "#fffbeb", bgGrad: ["#fef08a", "#f97316"] },
      };

      let CARD_POOL = [
        { id: "cinder-leo", name: "신더 레오", code: "FL", hue: 0.02, rarityKey: "common" },
        { id: "tide-fin", name: "타이드 핀", code: "TD", hue: 0.57, rarityKey: "common" },
        { id: "moss-guard", name: "모스 가디언", code: "MS", hue: 0.34, rarityKey: "common" },
        { id: "volt-runner", name: "볼트 러너", code: "VT", hue: 0.14, rarityKey: "uncommon" },
        { id: "stone-lynx", name: "스톤 링크스", code: "SL", hue: 0.62, rarityKey: "uncommon" },
        { id: "aero-wing", name: "에어로 윙", code: "AW", hue: 0.52, rarityKey: "rare" },
        { id: "ruby-knight", name: "루비 나이트", code: "RN", hue: 0.96, rarityKey: "rare" },
        { id: "chrono-arc", name: "크로노 아크", code: "UR", hue: 0.12, rarityKey: "ultraRare" },
        { id: "nebula-dragon", name: "네뷸라 드래곤", code: "GD", hue: 0.75, rarityKey: "ultraRare" },
      ];

      const APP_STATE = { SEALED: "팩 대기", TEARING: "개봉 중", STACK: "카드 확인", COMPLETE: "완료" };
      let renderer, scene, camera, raycaster, pointerNdc;
      let packGroup, packBody, packTop, tearParticles, cardGroup;
      let cards = [], currentCardIndex = 0;
      let appState = APP_STATE.SEALED;
      let drag = null, pointerTilt = new THREE.Vector2(), pointerTargetTilt = new THREE.Vector2();
      let deviceTargetTilt = new THREE.Vector2(), combinedTilt = new THREE.Vector2();
      let deviceTiltActive = false, orientationPermissionAsked = false;
      let collection = loadCollection();
      let animationJobs = [], lastDragDistance = 0, isCardTransitioning = false, isCardDragging = false;
      let editingCardId = null;
      let registerBusy = false;
      let cropState = { img: null, x: 0, y: 0, scale: 1, isDragging: false, startX: 0, startY: 0 };

      loadCustomCards();
      resetCollectionStorageOnce();
      collection = loadCollection();
      init();
      animate();

      function loadCustomCards() {
        try {
          const deleted = JSON.parse(localStorage.getItem("three-deleted-cards") || "[]");
          CARD_POOL = CARD_POOL.filter(c => !deleted.includes(c.id));

          const stored = localStorage.getItem("three-custom-cards");
          if (stored) {
            const parsed = JSON.parse(stored);
            parsed.forEach(c => {
              c.isCustom = true;
              if (!CARD_POOL.find(p => p.id === c.id)) {
                CARD_POOL.push(c);
              } else {
                const existing = CARD_POOL.find(p => p.id === c.id);
                existing.isCustom = true;
              }
            });
          }
        } catch(e) { console.error(e); }
      }

      function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf3f8ff);
        scene.fog = new THREE.Fog(0xf3f8ff, 7, 18);

        camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0.5, 6.8);

        renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputColorSpace = THREE.SRGBColorSpace;

        raycaster = new THREE.Raycaster();
        pointerNdc = new THREE.Vector2();

        scene.add(new THREE.AmbientLight(0xffffff, 0.42));
        const keyLight = new THREE.DirectionalLight(0xffffff, 0.95);
        keyLight.position.set(3, 5, 4);
        scene.add(keyLight);

        createBackground();
        createPack();
        renderCollectionTab();
        renderRegisterTab();
        updateUi();

        window.addEventListener("resize", onResize);
        window.addEventListener("deviceorientation", onDeviceOrientation, true);
        canvas.addEventListener("pointerdown", onPointerDown);
        canvas.addEventListener("pointermove", onPointerMove);
        canvas.addEventListener("pointerup", onPointerUp);
        canvas.addEventListener("pointercancel", onPointerUp);
        canvas.addEventListener("click", onCanvasClick);

        resetBtn.addEventListener("click", () => {
          requestDeviceOrientationPermission();
          resetPack();
        });

        // Custom Card Registration
        cropState.img = null;
        cropState.x = 0;
        cropState.y = 0;
        cropState.scale = 1;
        cropState.isDragging = false;
        const fileInput = document.querySelector("#customCardImage");
        const cropEditor = document.querySelector("#cropEditor");
        const cropBox = document.querySelector("#cropBox");
        const cropImage = document.querySelector("#cropImage");
        const cropZoom = document.querySelector("#cropZoom");
        const raritySelect = document.querySelector("#customCardRarity");
        
        function updateCropTransform() {
          cropImage.style.transform = `translate(${cropState.x}px, ${cropState.y}px) scale(${cropState.scale})`;
        }

        function updateCropBoxSize() {
          const isRare = raritySelect.value === "rare" || raritySelect.value === "ultraRare";
          cropBox.style.width = isRare ? "200px" : "180px";
          cropBox.style.height = isRare ? "280px" : "140px";
        }

        raritySelect.addEventListener("change", updateCropBoxSize);
        updateCropBoxSize();

        fileInput.addEventListener("change", (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
              cropState.img = img;
              cropImage.src = img.src;
              cropEditor.style.display = "block";
              
              const boxRatio = parseInt(cropBox.style.width) / parseInt(cropBox.style.height);
              const imgRatio = img.width / img.height;
              
              if (imgRatio > boxRatio) {
                cropState.scale = parseInt(cropBox.style.height) / img.height;
              } else {
                cropState.scale = parseInt(cropBox.style.width) / img.width;
              }
              
              cropZoom.value = cropState.scale;
              cropState.x = (parseInt(cropBox.style.width) - img.width * cropState.scale) / 2;
              cropState.y = (parseInt(cropBox.style.height) - img.height * cropState.scale) / 2;
              updateCropTransform();
            };
            img.src = event.target.result;
          };
          reader.readAsDataURL(file);
        });

        cropZoom.addEventListener("input", (e) => {
          const oldScale = cropState.scale;
          cropState.scale = parseFloat(e.target.value);
          const ratio = cropState.scale / oldScale;
          cropState.x = cropState.x * ratio;
          cropState.y = cropState.y * ratio;
          updateCropTransform();
        });

        cropBox.addEventListener("pointerdown", (e) => {
          if (!cropState.img) return;
          cropState.isDragging = true;
          cropState.startX = e.clientX - cropState.x;
          cropState.startY = e.clientY - cropState.y;
          cropBox.setPointerCapture(e.pointerId);
        });

        cropBox.addEventListener("pointermove", (e) => {
          if (!cropState.isDragging) return;
          cropState.x = e.clientX - cropState.startX;
          cropState.y = e.clientY - cropState.startY;
          updateCropTransform();
        });

        const stopDrag = () => { cropState.isDragging = false; };
        cropBox.addEventListener("pointerup", stopDrag);
        cropBox.addEventListener("pointercancel", stopDrag);

        const registerActionHandler = (event) => {
          const button = event.target.closest("button");
          if (!button || !registerActionRow.contains(button) || registerBusy) return;

          if (button.id === "cancelRegisterEditBtn") {
            if (!editingCardId) return;
            resetRegisterEditor();
            return;
          }

          if (button.id !== "registerCustomBtn") return;

          registerBusy = true;
          const btn = document.querySelector("#registerCustomBtn");
          if (btn) {
            btn.textContent = "저장 중...";
            btn.disabled = true;
          }

          try {
            const titleInput = document.querySelector("#customCardTitle");
            const raritySelect = document.querySelector("#customCardRarity");
            const title = titleInput.value.trim();
            const rarity = raritySelect.value;
            const existingCard = editingCardId ? CARD_POOL.find((c) => c.id === editingCardId) : null;

            if (!cropState.img && !existingCard) {
              alert("이미지와 제목을 입력해 주세요!");
              return;
            }

            if (!title) {
              alert("제목을 입력해 주세요!");
              return;
            }

            if (!rarity) {
              alert("레어도를 선택해 주세요!");
              return;
            }

            let dataUrl = existingCard ? existingCard.imageUrl : null;

            if (cropState.img) {
              const cv = document.createElement("canvas");
              const isRare = rarity === "rare" || rarity === "ultraRare";
              cv.width = isRare ? 400 : 360;
              cv.height = isRare ? 560 : 280;
              const ctx = cv.getContext("2d");

              const renderScale = 2.0;
              ctx.fillStyle = "#fff";
              ctx.fillRect(0, 0, cv.width, cv.height);
              ctx.translate(cropState.x * renderScale, cropState.y * renderScale);
              ctx.scale(cropState.scale * renderScale, cropState.scale * renderScale);
              ctx.drawImage(cropState.img, 0, 0);
              ctx.setTransform(1, 0, 0, 1, 0, 0);

              dataUrl = cv.toDataURL("image/jpeg", 0.9);
            }

            if (existingCard) {
              existingCard.name = title;
              existingCard.rarityKey = rarity;
              if (dataUrl) existingCard.imageUrl = dataUrl;

              let customStored = [];
              try { customStored = JSON.parse(localStorage.getItem("three-custom-cards") || "[]"); } catch (e) {}
              const storedIdx = customStored.findIndex((c) => c.id === editingCardId);
              if (storedIdx > -1) {
                customStored[storedIdx].name = title;
                customStored[storedIdx].rarityKey = rarity;
                if (dataUrl) customStored[storedIdx].imageUrl = dataUrl;
                localStorage.setItem("three-custom-cards", JSON.stringify(customStored));
              }

              alert("카드가 수정되었습니다.");
            } else {
              const newCard = {
                id: "custom-" + Date.now(),
                name: title,
                code: "CST",
                hue: Math.random(),
                rarityKey: rarity,
                isCustom: true,
                imageUrl: dataUrl,
              };

              CARD_POOL.push(newCard);
              let customStored = [];
              try { customStored = JSON.parse(localStorage.getItem("three-custom-cards") || "[]"); } catch (e) {}
              customStored.push(newCard);
              try {
                localStorage.setItem("three-custom-cards", JSON.stringify(customStored));
              } catch (e) {
                alert("저장 공간이 부족해 더 이상 카드를 저장할 수 없습니다.");
                return;
              }
              registerCard(newCard.id);
              alert("나만의 카드가 등록되었습니다.");
            }

            editingCardId = null;
            resetRegisterEditor();
            renderRegisterTab();
            renderCollectionTab();
          } catch (err) {
            console.error("register card error:", err);
            alert("카드 저장 중 오류가 발생했습니다.");
          } finally {
            registerBusy = false;
            const currentBtn = document.querySelector("#registerCustomBtn");
            if (currentBtn) {
              currentBtn.disabled = false;
              currentBtn.textContent = editingCardId ? "카드 수정 완료" : "나만의 카드 만들기";
            }
          }
        };

        registerActionRow.addEventListener("click", registerActionHandler);
        setRegisterActionMode(false);
      }

      function createPackTexture() {
        const cv = document.createElement("canvas");
        cv.width = 512;
        cv.height = 768;
        const ctx = cv.getContext("2d");
        const grad = ctx.createLinearGradient(0, 0, 512, 768);
        grad.addColorStop(0, "#0fa893");
        grad.addColorStop(0.35, "#5beed8");
        grad.addColorStop(0.7, "#14b8a6");
        grad.addColorStop(1, "#0d6e62");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 512, 768);

        ctx.globalAlpha = 0.16;
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 4;
        for (let i = -400; i < 1024; i += 32) {
          ctx.beginPath();
          ctx.moveTo(i, 0);
          ctx.lineTo(i - 200, 768);
          ctx.stroke();
        }
        ctx.globalAlpha = 0.09;
        ctx.lineWidth = 2;
        for (let i = -400; i < 1024; i += 18) {
          ctx.beginPath();
          ctx.moveTo(i, 768);
          ctx.lineTo(i - 250, 0);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;

        ctx.fillStyle = "rgba(0,0,0,0.22)";
        ctx.fillRect(0, 0, 512, 100);
        ctx.strokeStyle = "rgba(255,255,255,0.9)";
        ctx.setLineDash([10, 7]);
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(0, 100);
        ctx.lineTo(512, 100);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.globalCompositeOperation = "lighter";
        ctx.globalAlpha = 0.22;
        const sgrad = ctx.createRadialGradient(256, 420, 20, 256, 420, 220);
        sgrad.addColorStop(0, "#ffffff");
        sgrad.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = sgrad;
        ctx.fillRect(20, 230, 472, 380);
        ctx.globalCompositeOperation = "source-over";
        ctx.globalAlpha = 1;

        const tex = new THREE.CanvasTexture(cv);
        tex.colorSpace = THREE.SRGBColorSpace;
        return tex;
      }
      function createSparkleTexture() {
        const cv = document.createElement("canvas");
        cv.width = 128; cv.height = 128;
        const ctx = cv.getContext("2d");
        const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
        grad.addColorStop(0, "rgba(255,255,255,1)");
        grad.addColorStop(0.3, "rgba(255,255,255,0.75)");
        grad.addColorStop(0.6, "rgba(255,255,255,0.2)");
        grad.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 128, 128);
        ctx.globalCompositeOperation = "lighter";
        const vGrad = ctx.createLinearGradient(64, 0, 64, 128);
        vGrad.addColorStop(0, "rgba(255,255,255,0)");
        vGrad.addColorStop(0.5, "rgba(255,255,255,1)");
        vGrad.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = vGrad;
        ctx.fillRect(60, 0, 8, 128);
        const hGrad = ctx.createLinearGradient(0, 64, 128, 64);
        hGrad.addColorStop(0, "rgba(255,255,255,0)");
        hGrad.addColorStop(0.5, "rgba(255,255,255,1)");
        hGrad.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = hGrad;
        ctx.fillRect(0, 60, 128, 8);
        return new THREE.CanvasTexture(cv);
      }

      function createAuraTexture(cfg) {
        const cv = document.createElement("canvas");
        cv.width = 256; cv.height = 256;
        const ctx = cv.getContext("2d");
        const grad = ctx.createRadialGradient(128, 128, 30, 128, 128, 128);
        grad.addColorStop(0, cfg.border);
        grad.addColorStop(0.45, cfg.bgGrad[1]);
        grad.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 256, 256);
        return new THREE.CanvasTexture(cv);
      }

      function createRayTexture() {
        const cv = document.createElement("canvas");
        cv.width = 512; cv.height = 512;
        const ctx = cv.getContext("2d");
        ctx.translate(256, 256);
        const rays = 18;
        for (let i = 0; i < rays; i++) {
          ctx.save();
          ctx.rotate((i / rays) * Math.PI * 2);
          const hue = (i / rays) * 360;
          const rg = ctx.createLinearGradient(0, 0, 260, 0);
          rg.addColorStop(0, `hsla(${hue}, 92%, 70%, 0.55)`);
          rg.addColorStop(0.45, `hsla(${hue}, 92%, 70%, 0.35)`);
          rg.addColorStop(0.8, `hsla(${hue}, 92%, 70%, 0.08)`);
          rg.addColorStop(1, `hsla(${hue}, 92%, 70%, 0)`);
          ctx.fillStyle = rg;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(260, -20);
          ctx.lineTo(260, 20);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }
        const cgrad = ctx.createRadialGradient(0, 0, 0, 0, 0, 90);
        cgrad.addColorStop(0, "rgba(255,255,255,0.45)");
        cgrad.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = cgrad;
        ctx.fillRect(-90, -90, 180, 180);

        ctx.globalCompositeOperation = "destination-in";
        const maskGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, 256);
        maskGrad.addColorStop(0, "rgba(0,0,0,1)");
        maskGrad.addColorStop(0.7, "rgba(0,0,0,1)");
        maskGrad.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = maskGrad;
        ctx.fillRect(-256, -256, 512, 512);
        ctx.globalCompositeOperation = "source-over";

        return new THREE.CanvasTexture(cv);
      }

      function createBurstTexture() {
        const cv = document.createElement("canvas");
        cv.width = 256; cv.height = 256;
        const ctx = cv.getContext("2d");
        const grad = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
        grad.addColorStop(0, "rgba(255,255,255,1)");
        grad.addColorStop(0.25, "rgba(255,250,200,0.9)");
        grad.addColorStop(0.5, "rgba(180,255,240,0.6)");
        grad.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 256, 256);
        return new THREE.CanvasTexture(cv);
      }

      function attachCardEffects(cardMesh, rarityKey) {
        const cfg = RARITY_CONFIG[rarityKey];
        const effects = new THREE.Group();
        effects.visible = false;
        effects.userData = { rarityKey, fadeIn: 0 };

        const auraMat = new THREE.MeshBasicMaterial({
          map: createAuraTexture(cfg),
          transparent: true,
          opacity: 0,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
        });
        const aura = new THREE.Mesh(new THREE.PlaneGeometry(3.8, 4.8), auraMat);
        aura.position.z = -0.05;
        effects.add(aura);
        effects.userData.aura = aura;

        if (rarityKey === "rare" || rarityKey === "ultraRare") {
          const sparkleTex = createSparkleTexture();
          const count = rarityKey === "ultraRare" ? 28 : 16;
          const sparkles = [];
          for (let i = 0; i < count; i++) {
            const color = rarityKey === "ultraRare"
              ? new THREE.Color().setHSL((i / count + Math.random() * 0.1) % 1, 0.9, 0.72)
              : new THREE.Color(cfg.border);
            const m = new THREE.SpriteMaterial({
              map: sparkleTex,
              color,
              transparent: true,
              opacity: 0,
              blending: THREE.AdditiveBlending,
              depthWrite: false,
            });
            const s = new THREE.Sprite(m);
            const angle = (i / count) * Math.PI * 2 + Math.random() * 0.4;
            const r = 0.95 + Math.random() * 0.9;
            s.position.set(Math.cos(angle) * r, Math.sin(angle) * r * 1.25, 0.08);
            const sc = 0.18 + Math.random() * 0.22;
            s.scale.setScalar(sc);
            s.userData = {
              baseAngle: angle,
              baseR: r,
              phase: Math.random() * Math.PI * 2,
              speed: 0.5 + Math.random() * 0.8,
              baseScale: sc,
            };
            effects.add(s);
            sparkles.push(s);
          }
          effects.userData.sparkles = sparkles;
        }

        if (rarityKey === "ultraRare") {
          const rayMat = new THREE.MeshBasicMaterial({
            map: createRayTexture(),
            transparent: true,
            opacity: 0,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
          });
          const rays = new THREE.Mesh(new THREE.PlaneGeometry(5.4, 5.4), rayMat);
          rays.position.z = -0.09;
          effects.add(rays);
          effects.userData.rays = rays;
        }

        cardMesh.add(effects);
        cardMesh.userData.effects = effects;
      }

      function updateCurrentCardEffects() {
        cards.forEach((c, idx) => {
          const fx = c.userData.effects;
          if (!fx) return;
          if (idx === currentCardIndex) {
            fx.visible = true;
            fx.userData.fadeIn = 0;
            animateValue(0, 1, 460, (t) => {
              const ease = 1 - Math.pow(1 - t, 3);
              fx.userData.fadeIn = ease;
            });
          } else {
            fx.visible = false;
            fx.userData.fadeIn = 0;
          }
        });
      }

      function createBurstTexture() {
        const cv = document.createElement("canvas");
        cv.width = 512;
        cv.height = 512;
        const ctx = cv.getContext("2d");
        const grad = ctx.createRadialGradient(256, 256, 20, 256, 256, 256);
        grad.addColorStop(0, "rgba(255, 255, 255, 1)");
        grad.addColorStop(0.3, "rgba(255, 230, 150, 0.8)");
        grad.addColorStop(1, "rgba(255, 255, 255, 0)");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 512, 512);
        
        ctx.translate(256, 256);
        ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
        for (let i = 0; i < 16; i++) {
          ctx.rotate(Math.PI / 8);
          ctx.beginPath();
          ctx.moveTo(-15, 0);
          ctx.lineTo(15, 0);
          ctx.lineTo(0, 250);
          ctx.fill();
        }
        return new THREE.CanvasTexture(cv);
      }

      function playUltraRareFlash(card, onComplete) {
        const fx = card.userData.effects;
        let finished = false;
        let fallbackTimer = null;

        if (fx) {
          fx.visible = false;
          fx.userData.fadeIn = 0;
        }

        const flashMat = new THREE.MeshBasicMaterial({
          map: createBurstTexture(),
          transparent: true,
          opacity: 0,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
          depthTest: false,
        });
        const flash = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), flashMat);
        flash.position.set(0, 0, 1.5);
        flash.renderOrder = 1000;
        scene.add(flash);

        const raysMat = new THREE.MeshBasicMaterial({
          map: createRayTexture(),
          transparent: true,
          opacity: 0,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
          depthTest: false,
        });
        const rays = new THREE.Mesh(new THREE.PlaneGeometry(14, 14), raysMat);
        rays.position.set(0, 0, 1.4);
        rays.renderOrder = 998;
        scene.add(rays);

        const sparkleTex = createSparkleTexture();
        const sparkles = [];
        const sparkleGroup = new THREE.Group();
        sparkleGroup.position.set(0, 0, 1.3);
        sparkleGroup.renderOrder = 999;
        scene.add(sparkleGroup);

        const sparkleCount = 32;
        for (let i = 0; i < sparkleCount; i++) {
          const hue = (i / sparkleCount + Math.random() * 0.08) % 1;
          const color = new THREE.Color().setHSL(hue, 0.92, 0.72);
          const m = new THREE.SpriteMaterial({
            map: sparkleTex,
            color: color,
            transparent: true,
            opacity: 0,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            depthTest: false,
          });
          const s = new THREE.Sprite(m);
          const angle = (i / sparkleCount) * Math.PI * 2 + Math.random() * 0.35;
          const speed = 3.5 + Math.random() * 3.5;
          s.userData = { angle, speed, baseScale: 0.30 + Math.random() * 0.32 };
          s.scale.setScalar(s.userData.baseScale);
          sparkleGroup.add(s);
          sparkles.push(s);
        }

        const finalize = () => {
          if (finished) return;
          finished = true;
          if (fallbackTimer) {
            clearTimeout(fallbackTimer);
            fallbackTimer = null;
          }
          try {
            scene.remove(flash);
            scene.remove(rays);
            scene.remove(sparkleGroup);
            flashMat.map?.dispose?.();
            flashMat.dispose?.();
            raysMat.map?.dispose?.();
            raysMat.dispose?.();
            sparkles.forEach((s) => s.material.dispose?.());
            sparkleTex.dispose?.();
          } catch (err) {}
          onComplete();
        };

        fallbackTimer = window.setTimeout(finalize, 700);

        animateValue(0, 1, 500, (t) => {
          if (t < 0.20) {
            const fp = t / 0.20;
            flash.material.opacity = Math.sin(fp * Math.PI) * 1.0;
            flash.scale.setScalar(0.3 + fp * 2.2);
          } else {
            flash.material.opacity = 0;
          }

          if (t > 0.05 && t < 0.95) {
            const rp = (t - 0.05) / 0.90;
            rays.material.opacity = Math.sin(rp * Math.PI) * 0.4;
            rays.scale.setScalar(0.5 + rp * 1.6);
            rays.rotation.z = (1 - Math.pow(1 - rp, 3)) * Math.PI * 0.5;
          } else {
            rays.material.opacity = 0;
          }

          if (t > 0.04) {
            const sp = (t - 0.04) / 0.96;
            sparkles.forEach((s) => {
              const ud = s.userData;
              const radius = ud.speed * sp;
              s.position.x = Math.cos(ud.angle) * radius;
              s.position.y = Math.sin(ud.angle) * radius;
              s.material.opacity = Math.max(0, 1 - sp * 1.1);
              s.scale.setScalar(ud.baseScale * (1 - sp * 0.35));
            });
          }

          if (fx && t > 0.08) {
            fx.visible = true;
            const ep = Math.min(1, (t - 0.08) / 0.85);
            fx.userData.fadeIn = 1 - Math.pow(1 - ep, 3);
          }
        }, finalize);
      }

      function createPack() {
